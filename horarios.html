<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios | Oasisbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div class="glass-box main-entrance" style="max-width: 800px;">
        <h1>HORARIOS</h1>
        <p>Entrena en el horario que mejor se adapte a ti.</p>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Días</th>
                        <th>Mañana</th>
                        <th>Tarde / Noche</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="time-col">Lunes a Viernes</td>
                        <td>06:00 AM - 10:00 AM</td>
                        <td>04:00 PM - 07:00 PM</td>
                    </tr>
                    <tr>
                        <td class="time-col">Sábados</td>
                        <td>07:00 AM - 09:00 AM</td>
                        <td style="color: #666; font-style: italic;">Cerrado</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="margin-top: 30px;">
            <p><strong>Nota:</strong> El box permanece abierto para entrenamiento libre en estos bloques.</p>
            <br>
            <a href="index.html" class="ig-link">← Volver al Inicio</a>
        </div>
    </div>

</body>
</html>
